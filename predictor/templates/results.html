{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eligibility Result</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Inter", "Poppins", system-ui, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;

            background: url("{% static 'images/bakround.jpeg' %}") no-repeat center center / cover;
            position: relative;
        }

        /* BLUR + DARK OVERLAY */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            z-index: 0;
        }

        /* CARD */
        .card {
            width: 100%;
            max-width: 520px; /* increased slightly */
            background: rgba(255, 255, 255, 0.95);
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            padding: 40px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .title.success {
            color: #166534;
        }

        .title.error {
            color: #991b1b;
        }

        .subtitle {
            font-size: 16px;
            color: #374151;
            margin-bottom: 18px;
        }

        /* LOADER */
        .spinner {
            width: 52px;
            height: 52px;
            border: 6px solid rgba(179, 18, 23, 0.2);
            border-top: 6px solid #b31217;
            border-radius: 50%;
            margin: 22px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: #b31217;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>

    {% if eligible %}
    <script>
        setTimeout(function () {
            window.location.href = "{% url 'donor_history' %}";
        }, 3000);
    </script>
    {% endif %}
</head>

<body>

<div class="card">

    {% if eligible %}
        <!-- ELIGIBLE -->
        <div class="title success">Eligible to Donate</div>

        <div class="subtitle">
            You meet the medical requirements for blood donation.
        </div>

        <div class="spinner"></div>

        <div class="subtitle">
            Preparing donor history assessment…
        </div>

    {% else %}
        <!-- NOT ELIGIBLE -->
        <div class="title error">Not Eligible</div>

        <div class="subtitle">
            You currently do not meet the eligibility requirements.
        </div>

        <a href="{% url 'home' %}">
            <button>Go Back</button>
        </a>
    {% endif %}

</div>

</body>
</html>
