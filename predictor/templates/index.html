{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blood Donation Eligibility</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="home-page">
    <input type="checkbox" id="menu-toggle">

<label for="menu-toggle" class="hamburger">
    <span></span>
    <span></span>
    <span></span>
</label>

<nav class="side-menu">
    <a href="{% url 'donor_probability' %}">Go to Results Page</a>
</nav>

<div class="container">
    <h1>AI Blood Donation Eligibility Check</h1>
    <p>Enter your details to check donation eligibility</p>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" min="0" placeholder="Enter age" required>
        </div>

        <div class="form-group">
            <label>Weight (kg)</label>
            <input type="number" name="weight" min="0" placeholder="Enter weight(kgs)" required>
        </div>

        <div class="form-group">
            <label>Hemoglobin Level (g/dL)</label>
            <input type="number" step="0.1" name="hb" min="0" placeholder="Enter hemoglobin level" required>
        </div>

        <div class="form-group">
            <label>Days Since Last Donation</label>
            <input type="number" name="last_donation" min="0" placeholder="Enter days" required>
        </div>

        <button type="submit">Check Eligibility</button>
    </form>
</div>
</body>
</html>
